<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand">My Todo App</a>
    </div>
  </nav>
  <div class="container my-3">
    <form action="/" method="POST">
      <h2>Add a Todos</h2>

      <div class="mb-3">
        <label class="form-label">Todo Title</label>
        <input type="text" class="form-control" name="title">
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" class="form-control" name="description">
      </div>

      <button type="submit" class="btn btn-success">Submit</button>
    </form>
  </div>
  {% if allTodo|length == 0 %}
  <div class="container my-3">
    <h2>Your Todos</h2>
    <div class="alert alert-info" role="alert">
      Add some todos to display here.
    </div>
  </div>
  {% else %}
  <div class="container my-3">
    <h2>Your Todos</h2>

    <table class="table">

      <thead>
        <tr>
          <th scope="col">SNo</th>
          <th scope="col">Title</th>
          <th scope="col">Description</th>
          <th scope="col">Status</th>

        </tr>
      </thead>

      <tbody>

        {% for todo in allTodo %}

        <tr>
          <th scope="row">{{ todo.id }}</th>
          <td>{{ todo.title }}</td>
          <td>{{ todo.description }}</td>
          <td><a href="/update/{{ todo.id }}" type="button" class="btn btn-outline-dark btn-sm">Update</a>
            <a href="/delete/{{ todo.id }}" type="button" class="btn btn-outline-dark btn-sm">Delete</a>
          </td>
        </tr>

        {% endfor %}

      </tbody>

    </table>
  </div>
  {% endif %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
